name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparo manual pela UI do GitHub

concurrency:
  group: deploy-main
  cancel-in-progress: true # se houver novo push, cancela o build anterior

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar credenciais do Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Configure os secrets DOCKERHUB_USERNAME e DOCKERHUB_TOKEN"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            marcioscar/adm-brassaco:latest
            marcioscar/adm-brassaco:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy no Portainer
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "::warning::PORTAINER_WEBHOOK_URL não configurado — pulando redeploy"
            exit 0
          fi
          curl -X POST "$PORTAINER_WEBHOOK_URL"
